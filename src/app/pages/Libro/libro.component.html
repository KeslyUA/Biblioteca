
<div class="fondo">
    
        <h1 class="global">Registrar Libro</h1>
        
     <div class="contenedor">

        <div class="sect">
                
            <mat-form-field appearance="outline" class="filtro">
                <mat-icon matPrefix class="icono-buscar">search</mat-icon>
                
                <input matInput 
                    (keyup)="buscarLibro($event)" 
                    placeholder="Buscar..." 
                    #input>
            </mat-form-field>
            <button mat-flat-button class="btn-registrar " (click)="abrirDialog()" color="accent">
                <mat-icon>add_circle</mat-icon>
                Registrar Libro
            </button>
        </div>
        
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> Id </th>
            <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="nombreLibro">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let element"> {{element.nombreLibro}} </td>
        </ng-container>

        <ng-container matColumnDef="tipo">
            <th mat-header-cell *matHeaderCellDef> Tipo </th>
            <td mat-cell *matCellDef="let element"> {{element.tipo}} </td>
        </ng-container>

        
        <ng-container matColumnDef="autor">
            <th mat-header-cell *matHeaderCellDef> Autor </th>
            <td mat-cell *matCellDef="let element"> {{element.autor}} </td>
        </ng-container>
        
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let element" >
                <button mat-icon-button class="btn-violeta "  (click)="abrirDialog(element)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button style="margin-left: 10px;" mat-icon-button  (click)="abrirDialogEliminar(element)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>
        
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        
        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="6">No data matching the filter "{{input.value}}"</td>
        </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
        </mat-paginator>

    </div>

</div>
